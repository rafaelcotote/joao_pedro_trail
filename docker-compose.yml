services:
  joao-pedro-trail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: joao_pedro_trail
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
